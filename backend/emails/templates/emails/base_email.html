<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<title>{% block subject %}AcadWorld{% endblock %}</title>
<!--[if mso]>
<noscript>
  <xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml>
</noscript>
<![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#f4f6f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

<!-- Outer wrapper -->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
       style="background-color:#f4f6f9;min-width:100%;margin:0;padding:0;">
  <tr>
    <td align="center" valign="top" style="padding:40px 16px;">

      <!-- Email card — max 600px -->
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"
             style="max-width:600px;width:100%;border-radius:12px;overflow:hidden;
                    box-shadow:0 4px 24px rgba(0,0,0,0.08);">

        <!-- ═══ HEADER ═══ -->
        <tr>
          <td style="background:linear-gradient(135deg,#6c3fc5 0%,#4f46e5 100%);
                     padding:28px 40px;text-align:center;">
            <!-- Wordmark -->
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
              <tr>
                <td align="center">
                  <span style="display:inline-block;background:#ffffff22;
                               border-radius:10px;padding:6px 14px;
                               font-size:22px;font-weight:800;color:#ffffff;
                               letter-spacing:-0.5px;">AW</span>
                  <span style="display:inline-block;margin-left:10px;
                               font-size:22px;font-weight:700;color:#ffffff;
                               vertical-align:middle;letter-spacing:-0.3px;">
                    {{ platform_name }}
                  </span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- ═══ BODY ═══ -->
        <tr>
          <td style="background:#ffffff;padding:40px 40px 32px;">
            {% block content %}{% endblock %}
          </td>
        </tr>

        <!-- ═══ FOOTER ═══ -->
        <tr>
          <td style="background:#f9fafb;border-top:1px solid #e5e7eb;
                     padding:24px 40px;text-align:center;">
            <p style="margin:0 0 6px;font-size:13px;color:#6b7280;line-height:1.5;">
              You are receiving this email because you have an account on
              <strong style="color:#4f46e5;">{{ platform_name }}</strong>.
            </p>
            <p style="margin:0 0 6px;font-size:12px;color:#9ca3af;line-height:1.5;">
              If you no longer wish to receive these emails, you can
              <a href="{{ frontend_url }}/settings" style="color:#6c3fc5;text-decoration:none;">
                manage your notification preferences
              </a>.
            </p>
            <p style="margin:12px 0 0;font-size:12px;color:#d1d5db;">
              &copy; {% now "Y" %} {{ platform_name }} · All rights reserved
            </p>
          </td>
        </tr>

      </table>
      <!-- /email card -->

    </td>
  </tr>
</table>

</body>
</html>
